<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Patil | Glorified Portfolio</title>
    <style>
        :root {
            --bg-dark: #030305;
            --card-bg: rgba(15, 15, 20, 0.7);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #a855f7;
            --accent-orange: #f59e0b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 80px 5%;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Mesh Background */
        .bg-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.1), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.1), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05), transparent 50%);
            filter: blur(80px);
            animation: pulseBg 15s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Enhancement */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 60px;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .logo { font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; }
        .logo span { color: var(--accent-blue); text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        .nav { display: flex; gap: 35px; align-items: center; }
        .nav a { 
            color: var(--text-dim); 
            text-decoration: none; 
            font-size: 0.75rem; 
            font-weight: 700; 
            letter-spacing: 2px; 
            transition: 0.4s;
            position: relative;
        }
        .nav a:hover { color: #fff; }
        .nav a::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 0;
            width: 0; height: 2px;
            background: var(--accent-blue);
            transition: 0.3s;
        }
        .nav a:hover::after { width: 100%; }

        .btn-connect {
            background: linear-gradient(135deg, #fff, #e2e8f0);
            color: #000;
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-connect:hover { transform: scale(1.1) translateY(-2px); box-shadow: 0 15px 30px rgba(255,255,255,0.2); }
